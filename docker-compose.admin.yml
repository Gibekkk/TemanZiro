services:
  tz-admin:
    image: moodbites-tz-admin:latest     # image dibangun via `docker build` di Jenkinsfile
    container_name: moodbites-tz-admin
    ports:
      - "5174:80"                        # host:5174 → nginx:80 di dalam container
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

name: Build and Auto Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-android:
    name: Build and Release Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: temanziro  # ← set default dir semua step

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.2'  # ← versi spesifik

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Android Release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Get short SHA for release tag
        id: vars
        working-directory: ${{ github.workspace }}  # ← git cmd dari root
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ steps.vars.outputs.sha_short }}
          name: Auto Release - Commit ${{ steps.vars.outputs.sha_short }}
          files: temanziro/android/app/build/outputs/apk/release/*.apk  # ← path APK dengan prefix folder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
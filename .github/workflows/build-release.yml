name: Build and Auto Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-android:
    name: Build and Release Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: temanziro

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.2'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Write google-services.json
        run: echo "${{ secrets.FIREBASE_JSON_BASE64 }}" | base64 --decode > google-services.json

      - name: Generate Android Folder
        run: CI=1 npx expo prebuild --platform android --clean

      - name: Patch build.gradle - Remove signing config
        working-directory: temanziro/android/app
        run: |
          sed -i '/signingConfigs {/,/^    }/d' build.gradle
          sed -i '/signingConfig signingConfigs.release/d' build.gradle
          echo "=== build.gradle setelah patch ==="
          cat build.gradle

      - name: Configure Gradle
        working-directory: temanziro/android
        run: |
          grep -v "org.gradle.jvmargs\|org.gradle.daemon\|org.gradle.parallel\|org.gradle.workers" \
            gradle.properties > gradle.properties.tmp
          mv gradle.properties.tmp gradle.properties
          echo "REACT_NATIVE_ARCHITECTURES=arm64-v8a"                               >> gradle.properties
          echo "org.gradle.daemon=false"                                             >> gradle.properties
          echo "org.gradle.parallel=false"                                           >> gradle.properties
          echo "org.gradle.workers.max=1"                                            >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+UseG1GC" >> gradle.properties

      - name: Build Android Debug APK
        working-directory: temanziro/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Get short SHA
        id: vars
        working-directory: ${{ github.workspace }}
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ steps.vars.outputs.sha_short }}
          name: Auto Release - Commit ${{ steps.vars.outputs.sha_short }}
          files: temanziro/android/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
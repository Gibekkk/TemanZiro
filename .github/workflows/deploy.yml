name: Deploy Admin to GitHub Pages

on:
  push:
    branches:
      - admin

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Buat .env dari secret
        run: |
          echo "${{ secrets.FIREBASE_JSON_BASE64_ADMIN }}" | base64 -d > firebase.json
          echo "VITE_FIREBASE_API_KEY=$(jq -r .apiKey firebase.json)" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=$(jq -r .authDomain firebase.json)" >> .env
          echo "VITE_FIREBASE_DATABASE_URL=$(jq -r .databaseURL firebase.json)" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=$(jq -r .projectId firebase.json)" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=$(jq -r .storageBucket firebase.json)" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=$(jq -r .messagingSenderId firebase.json)" >> .env
          echo "VITE_FIREBASE_APP_ID=$(jq -r .appId firebase.json)" >> .env
          rm firebase.json

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: admin/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

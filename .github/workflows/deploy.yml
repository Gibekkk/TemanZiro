name: Deploy Admin to Firebase Hosting
on:
  push:
    branches:
      - admin
permissions:
  contents: read
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Buat .env dari secret
        run: |
          echo "${{ secrets.FIREBASE_JSON_BASE64_ADMIN }}" | base64 -d > firebase-config.json
          echo "VITE_FIREBASE_API_KEY=$(jq -r .apiKey firebase-config.json)" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=$(jq -r .authDomain firebase-config.json)" >> .env
          echo "VITE_FIREBASE_DATABASE_URL=$(jq -r .databaseURL firebase-config.json)" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=$(jq -r .projectId firebase-config.json)" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=$(jq -r .storageBucket firebase-config.json)" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=$(jq -r .messagingSenderId firebase-config.json)" >> .env
          echo "VITE_FIREBASE_APP_ID=$(jq -r .appId firebase-config.json)" >> .env
          rm firebase-config.json

      - run: npm ci
      - run: npm run build

      - name: Decode service account
        id: decode-sa
        run: |
          SA_JSON=$(echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" | base64 -d)
          {
            echo "sa<<EOF"
            echo "$SA_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ steps.decode-sa.outputs.sa }}
          channelId: live
          projectId: temanziro-app
          entryPoint: admin
